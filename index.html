<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preload" href="/vendor/maplibre/maplibre-gl.css" as="style" />
    <link rel="preload" href="/vendor/maplibre/maplibre-gl.js" as="script" />
    <link id="tokyo-maplibre-style" rel="stylesheet" href="/vendor/maplibre/maplibre-gl.css" />
    <style>
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background:
          radial-gradient(circle at 18% 16%, rgba(255,255,255,0.95), transparent 32%),
          linear-gradient(180deg, #eff5f9 0%, #dfe8ef 100%);
        font-family: "Noto Sans SC", "Noto Sans JP", "PingFang SC", sans-serif;
      }

      body {
        color: #172033;
      }

      #root,
      #app-boot {
        position: fixed;
        inset: 0;
      }

      #app-boot {
        z-index: 0;
        pointer-events: none;
        transition: opacity 180ms ease;
      }

      html[data-app-mounted='true'] #app-boot {
        opacity: 0;
      }

      .app-boot__map {
        position: absolute;
        inset: 0;
        background:
          radial-gradient(circle at 52% 48%, rgba(255,255,255,0.88), rgba(255,255,255,0) 34%),
          linear-gradient(135deg, rgba(120, 151, 184, 0.16), rgba(255,255,255,0) 46%),
          linear-gradient(180deg, #edf4f8 0%, #d7e2ea 100%);
      }

      .app-boot__rings::before,
      .app-boot__rings::after {
        content: "";
        position: absolute;
        inset: auto auto 0 0;
        width: 46vw;
        height: 46vw;
        border-radius: 999px;
        border: 1px solid rgba(95, 117, 146, 0.14);
        transform: translate(31vw, 19vh);
      }

      .app-boot__rings::after {
        width: 32vw;
        height: 32vw;
        transform: translate(38vw, 26vh);
      }

      .app-boot__road,
      .app-boot__road::before {
        position: absolute;
        border-radius: 999px;
        background: rgba(255,255,255,0.72);
        content: "";
      }

      .app-boot__road {
        height: 14px;
        width: 42vw;
        left: 33vw;
        top: 39vh;
        transform: rotate(-10deg);
        box-shadow: 0 12px 30px rgba(54, 73, 102, 0.08);
      }

      .app-boot__road::before {
        width: 26vw;
        height: 10px;
        left: -8vw;
        top: 9.5vh;
        transform: rotate(66deg);
      }

      .app-boot__dot {
        position: absolute;
        left: 53vw;
        top: 43vh;
        width: 14px;
        height: 14px;
        border-radius: 999px;
        background: #1f4b99;
        box-shadow: 0 0 0 8px rgba(31, 75, 153, 0.12);
      }

      .app-boot__search,
      .app-boot__rail,
      .app-boot__chip {
        position: absolute;
        border-radius: 20px;
        background: rgba(255,255,255,0.95);
        box-shadow: 0 18px 40px rgba(20, 33, 61, 0.12);
      }

      .app-boot__rail {
        left: 12px;
        top: 12px;
        bottom: 12px;
        width: 68px;
      }

      .app-boot__search {
        left: 92px;
        top: 16px;
        width: min(440px, calc(100vw - 120px));
        height: 58px;
      }

      .app-boot__chip {
        top: 18px;
        height: 44px;
        width: 108px;
      }

      .app-boot__chip--1 { left: min(550px, calc(100vw - 470px)); }
      .app-boot__chip--2 { left: min(670px, calc(100vw - 350px)); width: 96px; }
      .app-boot__chip--3 { left: min(778px, calc(100vw - 242px)); width: 122px; }
    </style>
    <title>日本房价地图</title>
  </head>
  <body>
    <div id="app-boot" aria-hidden="true">
      <div class="app-boot__map"></div>
      <div class="app-boot__rings"></div>
      <div class="app-boot__road"></div>
      <div class="app-boot__dot"></div>
      <div class="app-boot__rail"></div>
      <div class="app-boot__search"></div>
      <div class="app-boot__chip app-boot__chip--1"></div>
      <div class="app-boot__chip app-boot__chip--2"></div>
      <div class="app-boot__chip app-boot__chip--3"></div>
    </div>
    <div id="root"></div>
    <script defer id="tokyo-maplibre-runtime" src="/vendor/maplibre/maplibre-gl.js"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
